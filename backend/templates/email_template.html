<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Data n Dreads Newsletter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .header {
            text-align: center;
            padding-bottom: 20px;
        }
        .title {
            color: #2c3e50;
        }
        .article {
            margin-bottom: 20px;
        }
        .article-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a73e8;
        }
        .article-summary {
            font-size: 14px;
            color: #444;
        }
        .read-more {
            display: inline-block;
            margin-top: 5px;
            color: #ffffff;
            background-color: #1a73e8;
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 5px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            text-align: center;
            color: #777;
        }
        .unsubscribe {
            color: red;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        
        <div class="header">
            <h2 class="title">📊 Data n Dreads</h2>
            <p>Curated AI & Data Science Insights</p>
        </div>

        {{articles}}

        <div class="footer">
            <p>Powered by DataForge 🚀</p>
            <p>
                <a class="unsubscribe" href="{{unsubscribe_link}}">
                    Unsubscribe
                </a>
            </p>
        </div>

    </div>
</body>
</html>
