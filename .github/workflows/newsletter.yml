name: Daily Newsletter

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"   # 8:00 AM IST

jobs:
  run-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt        # fixed: was backend/requirements.txt

      - name: Debug env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          echo "SUPABASE_URL present: $([[ -n $SUPABASE_URL ]] && echo yes || echo NO)"
          echo "SUPABASE_KEY present: $([[ -n $SUPABASE_KEY ]] && echo yes || echo NO)"
          echo "GNEWS_API_KEY present: $([[ -n $GNEWS_API_KEY ]] && echo yes || echo NO)"
          echo "RESEND_API_KEY present: $([[ -n $RESEND_API_KEY ]] && echo yes || echo NO)"
          echo "FROM_EMAIL present: $([[ -n $FROM_EMAIL ]] && echo yes || echo NO)"

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python -m backend.orchestrator